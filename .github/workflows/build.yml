name: Build sing-box rule sets

on:
  workflow_dispatch:

  push:
    paths:
      - "rules/*.json"
      - "scripts/**"
      - ".github/workflows/build.yml"

  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate IP-checkers source
        run: |
          set -eu

          python3 scripts/build_ip_checkers.py
          python3 -m json.tool rules/ip-checkers.json >/dev/null

      - name: Download sing-box
        run: |
          set -eu

          VERSION="1.12.17"
          ARCHIVE="sing-box-${VERSION}-linux-amd64.tar.gz"
          URL="https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/${ARCHIVE}"

          curl --fail --location "$URL" --output "$ARCHIVE"
          tar -xzf "$ARCHIVE"

          install \
            -m 0755 \
            "sing-box-${VERSION}-linux-amd64/sing-box" \
            /usr/local/bin/sing-box

          sing-box version

      - name: Validate source rule sets
        run: |
          set -eu

          python3 -m json.tool rules/ru-direct.json >/dev/null
          python3 -m json.tool rules/ip-checkers.json >/dev/null

      - name: Compile rule sets
        run: |
          set -eu

          mkdir -p output

          sing-box rule-set compile \
            --output output/ru-direct.srs \
            rules/ru-direct.json

          sing-box rule-set compile \
            --output output/ip-checkers.srs \
            rules/ip-checkers.json

          test -s output/ru-direct.srs
          test -s output/ip-checkers.srs

          ls -lh output/*.srs

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest rule sets
          make_latest: true
          files: |
            output/ru-direct.srs
            output/ip-checkers.srs
