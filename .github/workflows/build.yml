name: Build sing-box rule sets

on:
  workflow_dispatch:

  push:
    paths:
      - "rules/*.json"
      - "scripts/**"
      - "allowlist/**"
      - ".github/workflows/build.yml"

  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

concurrency:
  group: build-sing-box-rule-sets
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare build directories
        run: |
          set -eu

          rm -rf build output
          mkdir -p build/rules output

          test -f rules/ru-direct.json
          test -f scripts/build_ruleset.py
          test -f allowlist/oisd.txt
          test -f allowlist/proxy-from-direct.txt

          # Работаем с копией. Исходный rules/ru-direct.json
          # в репозитории не изменяется.
          cp rules/ru-direct.json build/rules/ru-direct.json

      - name: Generate external rule sets
        run: |
          set -eu

          python3 scripts/build_ruleset.py \
            "https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/refs/heads/main/rules/domains_geo_detect.list" \
            "build/rules/ip-checkers.json"

          python3 scripts/build_ruleset.py \
            "https://dl.oisd.nl/oisd_big_surge.list" \
            "build/rules/oisd_big.json"

          python3 scripts/build_ruleset.py \
            "https://dl.oisd.nl/oisd_small_surge.list" \
            "build/rules/oisd_small.json"

      - name: Apply OISD allowlist
        run: |
          set -eu

          python3 - <<'PY'
          import json
          from pathlib import Path

          allowlist_path = Path("allowlist/oisd.txt")

          allowed_domains = {
              line.strip().lower().rstrip(".")
              for line in allowlist_path.read_text(
                  encoding="utf-8"
              ).splitlines()
              if line.strip()
              and not line.lstrip().startswith(("#", ";", "//"))
          }

          print(
              f"OISD allowlist contains "
              f"{len(allowed_domains)} domain(s)"
          )

          for domain in sorted(allowed_domains):
              print(f"  - {domain}")

          rule_files = [
              Path("build/rules/oisd_big.json"),
              Path("build/rules/oisd_small.json"),
          ]

          domain_keys = {
              "domain",
              "domain_suffix",
              "domain_keyword",
              "domain_regex",
          }

          for path in rule_files:
              if not path.exists():
                  raise SystemExit(
                      f"Required file not found: {path}"
                  )

              with path.open(encoding="utf-8") as file:
                  data = json.load(file)

              rules = data.get("rules")

              if not isinstance(rules, list):
                  raise SystemExit(
                      f"{path}: missing rules array"
                  )

              removed = []

              for rule in rules:
                  if not isinstance(rule, dict):
                      continue

                  for key in domain_keys:
                      values = rule.get(key)

                      if not isinstance(values, list):
                          continue

                      filtered = []

                      for value in values:
                          if not isinstance(value, str):
                              filtered.append(value)
                              continue

                          normalized = (
                              value.strip()
                              .lower()
                              .rstrip(".")
                          )

                          if normalized in allowed_domains:
                              removed.append((key, value))
                          else:
                              filtered.append(value)

                      if filtered:
                          rule[key] = filtered
                      else:
                          rule.pop(key, None)

              # Удаляем правила, которые после фильтрации
              # не содержат никаких значимых полей.
              data["rules"] = [
                  rule
                  for rule in rules
                  if isinstance(rule, dict)
                  and any(
                      value not in (
                          None,
                          "",
                          False,
                          [],
                          {},
                      )
                      for value in rule.values()
                  )
              ]

              with path.open(
                  "w",
                  encoding="utf-8",
              ) as file:
                  json.dump(
                      data,
                      file,
                      ensure_ascii=False,
                      indent=2,
                  )
                  file.write("\n")

              print(
                  f"{path}: removed "
                  f"{len(removed)} entry/entries"
              )

              for key, value in removed:
                  print(f"  removed {key}: {value}")
          PY

      - name: Verify OISD allowlist exclusions
        run: |
          set -eu

          python3 - <<'PY'
          import json
          from pathlib import Path

          allowlisted = {
              line.strip().lower().rstrip(".")
              for line in Path("allowlist/oisd.txt")
              .read_text(encoding="utf-8")
              .splitlines()
              if line.strip()
              and not line.lstrip().startswith(("#", ";", "//"))
          }

          files = [
              Path("build/rules/oisd_big.json"),
              Path("build/rules/oisd_small.json"),
          ]

          domain_keys = {
              "domain",
              "domain_suffix",
              "domain_keyword",
              "domain_regex",
          }

          found = []

          for path in files:
              with path.open(encoding="utf-8") as file:
                  data = json.load(file)

              for rule in data.get("rules", []):
                  if not isinstance(rule, dict):
                      continue

                  for key in domain_keys:
                      values = rule.get(key)

                      if not isinstance(values, list):
                          continue

                      for value in values:
                          if not isinstance(value, str):
                              continue

                          normalized = (
                              value.strip()
                              .lower()
                              .rstrip(".")
                          )

                          if normalized in allowlisted:
                              found.append(
                                  f"{path}: {key}: {value}"
                              )

          if found:
              print(
                  "Allowlisted domains remain in OISD:"
              )

              for item in found:
                  print(f"  {item}")

              raise SystemExit(1)

          print(
              "All OISD allowlist exclusions "
              "were applied successfully"
          )
          PY

      - name: Inject proxy exceptions into ru-direct
        run: |
          set -eu

          python3 - <<'PY'
          import json
          from pathlib import Path

          ru_direct_path = Path(
              "build/rules/ru-direct.json"
          )

          local_exceptions_path = Path(
              "allowlist/proxy-from-direct.txt"
          )

          if not ru_direct_path.exists():
              raise SystemExit(
                  f"Required file not found: "
                  f"{ru_direct_path}"
              )

          if not local_exceptions_path.exists():
              raise SystemExit(
                  f"Required file not found: "
                  f"{local_exceptions_path}"
              )

          exact_domains = set()
          suffix_domains = set()

          def normalize_domain(value: str) -> str:
              return (
                  value.strip()
                  .lower()
                  .rstrip(".")
              )

          def add_domain(
              rule_type: str,
              domain: str,
          ) -> None:
              domain = normalize_domain(domain)

              if not domain:
                  return

              if rule_type == "DOMAIN":
                  exact_domains.add(domain)

              elif rule_type == "DOMAIN-SUFFIX":
                  suffix_domains.add(domain)

          def parse_line(
              line: str,
              bare_as_suffix: bool,
          ) -> None:
              line = line.strip()

              if not line:
                  return

              if line.startswith(("#", ";", "//")):
                  return

              parts = [
                  part.strip()
                  for part in line.split(",")
              ]

              # В локальном файле разрешаем просто:
              #
              # example.com
              #
              # Такая строка считается DOMAIN-SUFFIX.
              if len(parts) == 1:
                  if bare_as_suffix:
                      add_domain(
                          "DOMAIN-SUFFIX",
                          parts[0],
                      )
                  return

              rule_type = parts[0].upper()
              domain = parts[1]

              if rule_type in {
                  "DOMAIN",
                  "DOMAIN-SUFFIX",
              }:
                  add_domain(
                      rule_type,
                      domain,
                  )

          # 1. Локальные пользовательские исключения.
          print(
              "Reading local proxy exceptions from:"
          )
          print(f"  {local_exceptions_path}")

          local_content = (
              local_exceptions_path.read_text(
                  encoding="utf-8"
              )
          )

          for line in local_content.splitlines():
              parse_line(
                  line,
                  bare_as_suffix=True,
              )

          local_exact_count = len(exact_domains)
          local_suffix_count = len(suffix_domains)

          print(
              f"Local exact domains: "
              f"{local_exact_count}"
          )
          print(
              f"Local domain suffixes: "
              f"{local_suffix_count}"
          )

          print("Proxy exceptions:")
          print(
              f"  exact domains: "
              f"{len(exact_domains)}"
          )
          print(
              f"  domain suffixes: "
              f"{len(suffix_domains)}"
          )

          if not exact_domains and not suffix_domains:
              raise SystemExit(
                  "No DOMAIN or DOMAIN-SUFFIX "
                  "proxy exceptions were collected"
              )

          with ru_direct_path.open(
              encoding="utf-8"
          ) as file:
              data = json.load(file)

          original_rules = data.get("rules")

          if (
              not isinstance(original_rules, list)
              or not original_rules
          ):
              raise SystemExit(
                  "ru-direct.json does not contain "
                  "a non-empty rules array"
              )

          # В одном обычном headless rule поля domain
          # и domain_suffix сопоставляются через OR.
          #
          # invert=True превращает его в:
          #
          # NOT (
          #   exact domains
          #   OR
          #   domain suffixes
          # )
          inverted_exceptions = {
              "invert": True,
          }

          if exact_domains:
              inverted_exceptions["domain"] = sorted(
                  exact_domains
              )

          if suffix_domains:
              inverted_exceptions[
                  "domain_suffix"
              ] = sorted(suffix_domains)

          # Если исходный ru-direct содержит несколько
          # отдельных правил, объединяем их через OR.
          if len(original_rules) == 1:
              original_direct_rule = original_rules[0]
          else:
              original_direct_rule = {
                  "type": "logical",
                  "mode": "or",
                  "rules": original_rules,
              }

          # Итоговая логика:
          #
          # original ru-direct
          # AND
          # NOT (
          #   proxy-from-direct.txt
          # )
          smart_rule = {
              "type": "logical",
              "mode": "and",
              "rules": [
                  original_direct_rule,
                  inverted_exceptions,
              ],
          }

          data["rules"] = [smart_rule]

          with ru_direct_path.open(
              "w",
              encoding="utf-8",
          ) as file:
              json.dump(
                  data,
                  file,
                  ensure_ascii=False,
                  indent=2,
              )
              file.write("\n")

          print(
              f"Generated final {ru_direct_path}"
          )
          PY

      - name: Validate final JSON files
        run: |
          set -eu

          required_json_files="
          build/rules/ru-direct.json
          build/rules/ip-checkers.json
          build/rules/oisd_big.json
          build/rules/oisd_small.json
          "

          for file in $required_json_files; do
            echo "Validating JSON: $file"
            python3 -m json.tool "$file" >/dev/null
          done

      - name: Check generated rule counts
        run: |
          set -eu

          python3 - <<'PY'
          import json
          from pathlib import Path

          ENTRY_KEYS = {
              "domain",
              "domain_suffix",
              "domain_keyword",
              "domain_regex",
              "ip_cidr",
              "source_ip_cidr",
              "port",
              "port_range",
              "source_port",
              "source_port_range",
          }

          def count_entries(value) -> int:
              if isinstance(value, dict):
                  total = 0

                  for key, child in value.items():
                      if (
                          key in ENTRY_KEYS
                          and isinstance(child, list)
                      ):
                          total += len(child)
                      else:
                          total += count_entries(child)

                  return total

              if isinstance(value, list):
                  return sum(
                      count_entries(item)
                      for item in value
                  )

              return 0

          minimums = {
              Path(
                  "build/rules/ip-checkers.json"
              ): 100,

              Path(
                  "build/rules/oisd_big.json"
              ): 10000,

              Path(
                  "build/rules/oisd_small.json"
              ): 1000,

              Path(
                  "build/rules/ru-direct.json"
              ): 10,
          }

          for path, minimum in minimums.items():
              if not path.exists():
                  raise SystemExit(
                      f"Required file not found: {path}"
                  )

              with path.open(
                  encoding="utf-8"
              ) as file:
                  data = json.load(file)

              count = count_entries(data)

              print(
                  f"{path}: {count} entries"
              )

              if count < minimum:
                  raise SystemExit(
                      f"{path}: only {count} entries; "
                      f"expected at least {minimum}"
                  )
          PY

      - name: Download sing-box
        run: |
          set -eu

          VERSION="1.12.17"
          ARCHIVE="sing-box-${VERSION}-linux-amd64.tar.gz"
          URL="https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/${ARCHIVE}"

          curl \
            --fail \
            --location \
            --retry 3 \
            --retry-delay 5 \
            "$URL" \
            --output "$ARCHIVE"

          tar -xzf "$ARCHIVE"

          install \
            -m 0755 \
            "sing-box-${VERSION}-linux-amd64/sing-box" \
            /usr/local/bin/sing-box

          sing-box version

      - name: Compile rule sets
        run: |
          set -eu

          required_json_files="
          build/rules/ru-direct.json
          build/rules/ip-checkers.json
          build/rules/oisd_big.json
          build/rules/oisd_small.json
          "

          for file in $required_json_files; do
            name="$(basename "$file" .json)"
            output_file="output/${name}.srs"

            echo \
              "Compiling $file -> $output_file"

            sing-box rule-set compile \
              --output "$output_file" \
              "$file"

            test -s "$output_file"
          done

          echo "Compiled rule sets:"
          ls -lh output/*.srs

      - name: Verify compiled files
        run: |
          set -eu

          required_files="
          output/ru-direct.srs
          output/ip-checkers.srs
          output/oisd_big.srs
          output/oisd_small.srs
          "

          for file in $required_files; do
            if [ ! -s "$file" ]; then
              echo "Missing or empty file: $file"
              exit 1
            fi

            echo "Verified: $file"
          done

      - name: Publish latest release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest rule sets
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            output/ru-direct.srs
            output/ip-checkers.srs
            output/oisd_big.srs
            output/oisd_small.srs

