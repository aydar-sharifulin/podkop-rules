name: Build sing-box and Shadowrocket rule sets

on:
  workflow_dispatch:

  push:
    paths:
      - "rules/*.json"
      - "scripts/**"
      - "allowlist/**"
      - ".github/workflows/build.yml"

  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

concurrency:
  group: build-rule-sets
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare build directories
        run: |
          set -eu

          rm -rf build output
          mkdir -p build/rules output

          test -f rules/ru-direct.json
          test -f scripts/build_ruleset.py
          test -f allowlist/oisd.txt
          test -f allowlist/proxy-from-direct.txt

          # Сборка выполняется с копией.
          # Исходный rules/ru-direct.json не изменяется.
          cp rules/ru-direct.json build/rules/ru-direct.json

      - name: Generate external rule sets
        run: |
          set -eu

          python3 scripts/build_ruleset.py \
            "https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/refs/heads/main/rules/domains_geo_detect.list" \
            "build/rules/ip-checkers.json"

          python3 scripts/build_ruleset.py \
            "https://raw.githubusercontent.com/itdoginfo/allow-domains/refs/heads/main/Russia/outside-clashx.lst" \
            "build/rules/russia-outside.json"

          python3 scripts/build_ruleset.py \
            "https://dl.oisd.nl/oisd_big_surge.list" \
            "build/rules/oisd_big.json"

          python3 scripts/build_ruleset.py \
            "https://dl.oisd.nl/oisd_small_surge.list" \
            "build/rules/oisd_small.json"

      - name: Merge external DIRECT domains
        run: |
          set -eu

          python3 - <<'PY'
          import json
          from pathlib import Path

          ru_direct_path = Path("build/rules/ru-direct.json")
          external_path = Path("build/rules/russia-outside.json")

          domain_keys = (
              "domain",
              "domain_suffix",
              "domain_keyword",
              "domain_regex",
          )

          def load_json(path: Path) -> dict:
              if not path.exists():
                  raise SystemExit(
                      f"Required file not found: {path}"
                  )

              with path.open(encoding="utf-8") as file:
                  data = json.load(file)

              if not isinstance(data.get("rules"), list):
                  raise SystemExit(
                      f"{path}: missing rules array"
                  )

              return data

          base = load_json(ru_direct_path)
          external = load_json(external_path)

          merged = {
              key: set()
              for key in domain_keys
          }

          for data in (base, external):
              for rule in data["rules"]:
                  if not isinstance(rule, dict):
                      continue

                  for key in domain_keys:
                      values = rule.get(key)

                      if not isinstance(values, list):
                          continue

                      for value in values:
                          if not isinstance(value, str):
                              continue

                          normalized = (
                              value.strip()
                              .lower()
                              .rstrip(".")
                          )

                          if normalized:
                              merged[key].add(normalized)

          combined_rule = {
              key: sorted(values)
              for key, values in merged.items()
              if values
          }

          if not combined_rule:
              raise SystemExit(
                  "Merged DIRECT rule set is empty"
              )

          result = {
              "version": 3,
              "rules": [combined_rule],
          }

          with ru_direct_path.open(
              "w",
              encoding="utf-8",
          ) as file:
              json.dump(
                  result,
                  file,
                  ensure_ascii=False,
                  indent=2,
              )
              file.write("\n")

          print("Merged DIRECT domains:")
          for key, values in combined_rule.items():
              print(f"  {key}: {len(values)}")
          PY

      - name: Apply OISD allowlist
        run: |
          set -eu

          python3 - <<'PY'
          import json
          from pathlib import Path

          allowlist_path = Path("allowlist/oisd.txt")

          allowed_domains = {
              line.strip().lower().rstrip(".")
              for line in allowlist_path.read_text(
                  encoding="utf-8"
              ).splitlines()
              if line.strip()
              and not line.lstrip().startswith(("#", ";", "//"))
          }

          print(
              f"OISD allowlist contains "
              f"{len(allowed_domains)} domain(s)"
          )

          for domain in sorted(allowed_domains):
              print(f"  - {domain}")

          rule_files = [
              Path("build/rules/oisd_big.json"),
              Path("build/rules/oisd_small.json"),
          ]

          domain_keys = {
              "domain",
              "domain_suffix",
              "domain_keyword",
              "domain_regex",
          }

          for path in rule_files:
              if not path.exists():
                  raise SystemExit(
                      f"Required file not found: {path}"
                  )

              with path.open(encoding="utf-8") as file:
                  data = json.load(file)

              rules = data.get("rules")

              if not isinstance(rules, list):
                  raise SystemExit(
                      f"{path}: missing rules array"
                  )

              removed = []

              for rule in rules:
                  if not isinstance(rule, dict):
                      continue

                  for key in domain_keys:
                      values = rule.get(key)

                      if not isinstance(values, list):
                          continue

                      filtered = []

                      for value in values:
                          if not isinstance(value, str):
                              filtered.append(value)
                              continue

                          normalized = (
                              value.strip()
                              .lower()
                              .rstrip(".")
                          )

                          if normalized in allowed_domains:
                              removed.append((key, value))
                          else:
                              filtered.append(value)

                      if filtered:
                          rule[key] = filtered
                      else:
                          rule.pop(key, None)

              # Удаляем правила, которые стали пустыми.
              data["rules"] = [
                  rule
                  for rule in rules
                  if isinstance(rule, dict)
                  and any(
                      value not in (
                          None,
                          "",
                          False,
                          [],
                          {},
                      )
                      for value in rule.values()
                  )
              ]

              with path.open(
                  "w",
                  encoding="utf-8",
              ) as file:
                  json.dump(
                      data,
                      file,
                      ensure_ascii=False,
                      indent=2,
                  )
                  file.write("\n")

              print(
                  f"{path}: removed "
                  f"{len(removed)} entry/entries"
              )

              for key, value in removed:
                  print(f"  removed {key}: {value}")
          PY

      - name: Verify OISD allowlist exclusions
        run: |
          set -eu

          python3 - <<'PY'
          import json
          from pathlib import Path

          allowlisted = {
              line.strip().lower().rstrip(".")
              for line in Path("allowlist/oisd.txt")
              .read_text(encoding="utf-8")
              .splitlines()
              if line.strip()
              and not line.lstrip().startswith(("#", ";", "//"))
          }

          files = [
              Path("build/rules/oisd_big.json"),
              Path("build/rules/oisd_small.json"),
          ]

          domain_keys = {
              "domain",
              "domain_suffix",
              "domain_keyword",
              "domain_regex",
          }

          found = []

          for path in files:
              with path.open(encoding="utf-8") as file:
                  data = json.load(file)

              for rule in data.get("rules", []):
                  if not isinstance(rule, dict):
                      continue

                  for key in domain_keys:
                      values = rule.get(key)

                      if not isinstance(values, list):
                          continue

                      for value in values:
                          if not isinstance(value, str):
                              continue

                          normalized = (
                              value.strip()
                              .lower()
                              .rstrip(".")
                          )

                          if normalized in allowlisted:
                              found.append(
                                  f"{path}: {key}: {value}"
                              )

          if found:
              print(
                  "Allowlisted domains remain in OISD:"
              )

              for item in found:
                  print(f"  {item}")

              raise SystemExit(1)

          print(
              "All OISD allowlist exclusions "
              "were applied successfully"
          )
          PY

      - name: Build proxy exceptions
        run: |
          set -eu

          python3 - <<'PY'
          import json
          from pathlib import Path

          source_path = Path(
              "allowlist/proxy-from-direct.txt"
          )

          output_path = Path(
              "build/proxy-exceptions.json"
          )

          if not source_path.exists():
              raise SystemExit(
                  f"Required file not found: {source_path}"
              )

          exact_domains = set()
          suffix_domains = set()
          keyword_domains = set()
          regex_domains = set()

          def normalize(value: str) -> str:
              return (
                  value.strip()
                  .lower()
                  .rstrip(".")
              )

          for raw_line in source_path.read_text(
              encoding="utf-8"
          ).splitlines():
              line = raw_line.strip()

              if not line:
                  continue

              if line.startswith(("#", ";", "//")):
                  continue

              parts = [
                  part.strip()
                  for part in line.split(",")
              ]

              # Простая строка считается DOMAIN-SUFFIX.
              if len(parts) == 1:
                  value = normalize(parts[0])

                  if value:
                      suffix_domains.add(value)

                  continue

              rule_type = parts[0].upper()
              value = normalize(parts[1])

              if not value:
                  continue

              if rule_type == "DOMAIN":
                  exact_domains.add(value)

              elif rule_type == "DOMAIN-SUFFIX":
                  suffix_domains.add(value)

              elif rule_type == "DOMAIN-KEYWORD":
                  keyword_domains.add(value)

              elif rule_type == "DOMAIN-REGEX":
                  regex_domains.add(value)

          payload = {
              "domain": sorted(exact_domains),
              "domain_suffix": sorted(suffix_domains),
              "domain_keyword": sorted(keyword_domains),
              "domain_regex": sorted(regex_domains),
          }

          output_path.write_text(
              json.dumps(
                  payload,
                  ensure_ascii=False,
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )

          print("Proxy exceptions:")
          print(f"  exact: {len(exact_domains)}")
          print(f"  suffix: {len(suffix_domains)}")
          print(f"  keyword: {len(keyword_domains)}")
          print(f"  regex: {len(regex_domains)}")
          PY

      - name: Inject proxy exceptions into ru-direct
        run: |
          set -eu

          python3 - <<'PY'
          import json
          from pathlib import Path

          ru_direct_path = Path(
              "build/rules/ru-direct.json"
          )

          exceptions_path = Path(
              "build/proxy-exceptions.json"
          )

          if not ru_direct_path.exists():
              raise SystemExit(
                  f"Required file not found: "
                  f"{ru_direct_path}"
              )

          if not exceptions_path.exists():
              raise SystemExit(
                  f"Required file not found: "
                  f"{exceptions_path}"
              )

          with ru_direct_path.open(
              encoding="utf-8"
          ) as file:
              data = json.load(file)

          with exceptions_path.open(
              encoding="utf-8"
          ) as file:
              exceptions = json.load(file)

          original_rules = data.get("rules")

          if (
              not isinstance(original_rules, list)
              or not original_rules
          ):
              raise SystemExit(
                  "ru-direct.json does not contain "
                  "a non-empty rules array"
              )

          inverted_exceptions = {
              "invert": True,
          }

          for key in (
              "domain",
              "domain_suffix",
              "domain_keyword",
              "domain_regex",
          ):
              values = exceptions.get(key)

              if isinstance(values, list) and values:
                  inverted_exceptions[key] = values

          has_exceptions = any(
              key != "invert"
              for key in inverted_exceptions
          )

          if not has_exceptions:
              print(
                  "No proxy exceptions found; "
                  "ru-direct remains unchanged"
              )
              raise SystemExit(0)

          if len(original_rules) == 1:
              original_direct_rule = original_rules[0]
          else:
              original_direct_rule = {
                  "type": "logical",
                  "mode": "or",
                  "rules": original_rules,
              }

          # Итоговая логика:
          #
          # original DIRECT
          # AND
          # NOT(proxy exceptions)
          smart_rule = {
              "type": "logical",
              "mode": "and",
              "rules": [
                  original_direct_rule,
                  inverted_exceptions,
              ],
          }

          data["rules"] = [smart_rule]

          with ru_direct_path.open(
              "w",
              encoding="utf-8",
          ) as file:
              json.dump(
                  data,
                  file,
                  ensure_ascii=False,
                  indent=2,
              )
              file.write("\n")

          print(
              f"Generated final {ru_direct_path}"
          )
          PY

      - name: Validate generated JSON files
        run: |
          set -eu

          required_json_files="
          build/rules/ru-direct.json
          build/rules/russia-outside.json
          build/rules/ip-checkers.json
          build/rules/oisd_big.json
          build/rules/oisd_small.json
          build/proxy-exceptions.json
          "

          for file in $required_json_files; do
            echo "Validating JSON: $file"
            python3 -m json.tool "$file" >/dev/null
          done

      - name: Check generated rule counts
        run: |
          set -eu

          python3 - <<'PY'
          import json
          from pathlib import Path

          ENTRY_KEYS = {
              "domain",
              "domain_suffix",
              "domain_keyword",
              "domain_regex",
              "ip_cidr",
              "source_ip_cidr",
              "port",
              "port_range",
              "source_port",
              "source_port_range",
          }

          def count_entries(value) -> int:
              if isinstance(value, dict):
                  total = 0

                  for key, child in value.items():
                      if (
                          key in ENTRY_KEYS
                          and isinstance(child, list)
                      ):
                          total += len(child)
                      else:
                          total += count_entries(child)

                  return total

              if isinstance(value, list):
                  return sum(
                      count_entries(item)
                      for item in value
                  )

              return 0

          minimums = {
              Path(
                  "build/rules/ip-checkers.json"
              ): 100,

              Path(
                    "build/rules/russia-outside.json"
              ): 20,

              Path(
                  "build/rules/oisd_big.json"
              ): 10000,

              Path(
                  "build/rules/oisd_small.json"
              ): 1000,

              Path(
                  "build/rules/ru-direct.json"
              ): 10,
          }

          for path, minimum in minimums.items():
              if not path.exists():
                  raise SystemExit(
                      f"Required file not found: {path}"
                  )

              with path.open(
                  encoding="utf-8"
              ) as file:
                  data = json.load(file)

              count = count_entries(data)

              print(
                  f"{path}: {count} entries"
              )

              if count < minimum:
                  raise SystemExit(
                      f"{path}: only {count} entries; "
                      f"expected at least {minimum}"
                  )
          PY

      - name: Download sing-box
        run: |
          set -eu

          VERSION="1.12.17"
          ARCHIVE="sing-box-${VERSION}-linux-amd64.tar.gz"
          URL="https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/${ARCHIVE}"

          curl \
            --fail \
            --location \
            --retry 3 \
            --retry-delay 5 \
            "$URL" \
            --output "$ARCHIVE"

          tar -xzf "$ARCHIVE"

          install \
            -m 0755 \
            "sing-box-${VERSION}-linux-amd64/sing-box" \
            /usr/local/bin/sing-box

          sing-box version

      - name: Compile sing-box rule sets
        run: |
          set -eu

          required_json_files="
          build/rules/ru-direct.json
          build/rules/ip-checkers.json
          build/rules/oisd_big.json
          build/rules/oisd_small.json
          "

          for file in $required_json_files; do
            name="$(basename "$file" .json)"
            output_file="output/${name}.srs"

            echo \
              "Compiling $file -> $output_file"

            sing-box rule-set compile \
              --output "$output_file" \
              "$file"

            test -s "$output_file"
          done

          echo "Compiled sing-box rule sets:"
          ls -lh output/*.srs

      - name: Verify compiled sing-box files
        run: |
          set -eu

          required_files="
          output/ru-direct.srs
          output/ip-checkers.srs
          output/oisd_big.srs
          output/oisd_small.srs
          "

          for file in $required_files; do
            if [ ! -s "$file" ]; then
              echo "Missing or empty file: $file"
              exit 1
            fi

            echo "Verified: $file"
          done

      - name: Generate Shadowrocket rule lists
        run: |
          set -eu

          python3 - <<'PY'
          import json
          from pathlib import Path
          from typing import Any

          output_dir = Path("output")
          output_dir.mkdir(
              parents=True,
              exist_ok=True,
          )

          rule_types = {
              "domain": "DOMAIN",
              "domain_suffix": "DOMAIN-SUFFIX",
              "domain_keyword": "DOMAIN-KEYWORD",
              "domain_regex": "DOMAIN-REGEX",
              "ip_cidr": "IP-CIDR",
              "ip_cidr6": "IP-CIDR6",
          }

          def normalize(value: str) -> str:
              return (
                  value.strip()
                  .lower()
                  .rstrip(".")
              )

          def load_json(path: Path) -> Any:
              if not path.exists():
                  raise SystemExit(
                      f"Required file not found: {path}"
                  )

              with path.open(encoding="utf-8") as file:
                  return json.load(file)

          def collect_rules(value: Any) -> set[str]:
              """
              Convert ordinary sing-box source rules to
              Shadowrocket/Surge rule-set lines.

              Inverted rules are skipped because PROXY exceptions
              are published separately.
              """
              result: set[str] = set()

              if isinstance(value, list):
                  for item in value:
                      result.update(collect_rules(item))

                  return result

              if not isinstance(value, dict):
                  return result

              if value.get("invert") is True:
                  return result

              for key, shadowrocket_type in rule_types.items():
                  entries = value.get(key)

                  if not isinstance(entries, list):
                      continue

                  for entry in entries:
                      if not isinstance(entry, str):
                          continue

                      normalized = normalize(entry)

                      if normalized:
                          result.add(
                              f"{shadowrocket_type},"
                              f"{normalized}"
                          )

              nested_rules = value.get("rules")

              if isinstance(nested_rules, list):
                  result.update(
                      collect_rules(nested_rules)
                  )

              return result

          def write_list(
              path: Path,
              rules: set[str],
              title: str,
              allow_empty: bool = False,
          ) -> None:
              if not rules and not allow_empty:
                  raise SystemExit(
                      f"{path}: no rules generated"
                  )

              lines = [
                  f"# {title}",
                  "# Generated automatically by GitHub Actions.",
                  "",
                  *sorted(rules),
                  "",
              ]

              path.write_text(
                  "\n".join(lines),
                  encoding="utf-8",
              )

              print(
                  f"{path}: {len(rules)} rules"
              )

          # Для Shadowrocket DIRECT публикуется из исходного
          # ru-direct.json.
          #
          # Исключения идут отдельным PROXY ruleset и должны
          # находиться раньше ru-direct.list в конфигурации.
          ru_direct = load_json(
              Path("build/rules/ru-direct.json")
          )

          ip_checkers = load_json(
              Path("build/rules/ip-checkers.json")
          )

          oisd_big = load_json(
              Path("build/rules/oisd_big.json")
          )

          oisd_small = load_json(
              Path("build/rules/oisd_small.json")
          )

          proxy_exceptions = load_json(
              Path("build/proxy-exceptions.json")
          )

          write_list(
              output_dir / "ru-direct.list",
              collect_rules(ru_direct),
              "Russian and trusted DIRECT domains",
          )

          write_list(
              output_dir / "ip-checkers.list",
              collect_rules(ip_checkers),
              "IP detection and geolocation services",
          )

          write_list(
              output_dir / "oisd_big.list",
              collect_rules(oisd_big),
              "OISD Big block list",
          )

          write_list(
              output_dir / "oisd_small.list",
              collect_rules(oisd_small),
              "OISD Small block list",
          )

          write_list(
              output_dir / "proxy-from-direct.list",
              collect_rules(proxy_exceptions),
              "Explicit PROXY exceptions from DIRECT",
              allow_empty=True,
          )
          PY

          echo "Generated Shadowrocket lists:"
          ls -lh output/*.list

      - name: Verify Shadowrocket rule lists
        run: |
          set -eu

          required_lists="
          output/ru-direct.list
          output/proxy-from-direct.list
          output/ip-checkers.list
          output/oisd_big.list
          output/oisd_small.list
          "

          for file in $required_lists; do
            if [ ! -f "$file" ]; then
              echo "Missing file: $file"
              exit 1
            fi

            echo "Verified: $file"
          done

          python3 - <<'PY'
          from pathlib import Path

          minimums = {
              Path("output/ru-direct.list"): 10,
              Path("output/ip-checkers.list"): 100,
              Path("output/oisd_big.list"): 10000,
              Path("output/oisd_small.list"): 1000,
          }

          for path, minimum in minimums.items():
              count = sum(
                  1
                  for line in path.read_text(
                      encoding="utf-8"
                  ).splitlines()
                  if line.strip()
                  and not line.lstrip().startswith(
                      ("#", ";", "//")
                  )
              )

              print(f"{path}: {count} rules")

              if count < minimum:
                  raise SystemExit(
                      f"{path}: only {count} rules; "
                      f"expected at least {minimum}"
                  )

          proxy_path = Path(
              "output/proxy-from-direct.list"
          )

          proxy_count = sum(
              1
              for line in proxy_path.read_text(
                  encoding="utf-8"
              ).splitlines()
              if line.strip()
              and not line.lstrip().startswith(
                  ("#", ";", "//")
              )
          )

          print(
              f"{proxy_path}: {proxy_count} rules"
          )
          PY

      - name: Show release files
        run: |
          set -eu

          echo "Release files:"
          ls -lh \
            output/ru-direct.srs \
            output/ip-checkers.srs \
            output/oisd_big.srs \
            output/oisd_small.srs \
            output/ru-direct.list \
            output/proxy-from-direct.list \
            output/ip-checkers.list \
            output/oisd_big.list \
            output/oisd_small.list

      - name: Publish latest release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest rule sets
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            output/ru-direct.srs
            output/ip-checkers.srs
            output/oisd_big.srs
            output/oisd_small.srs
            output/ru-direct.list
            output/proxy-from-direct.list
            output/ip-checkers.list
            output/oisd_big.list
            output/oisd_small.list
