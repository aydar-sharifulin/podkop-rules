name: Build sing-box rule sets

on:
  workflow_dispatch:

  push:
    paths:
      - "rules/*.json"
      - "scripts/**"
      - ".github/workflows/build.yml"

  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate source rule sets
        run: |
          set -eu

          python3 scripts/build_ruleset.py \
            "https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/refs/heads/main/rules/domains_geo_detect.list" \
            "rules/ip-checkers.json"

          python3 scripts/build_ruleset.py \
            "https://dl.oisd.nl/oisd_big_surge.list" \
            "rules/oisd.json"

      - name: Validate JSON rule sets
        run: |
          set -eu

          for file in rules/*.json; do
            echo "Validating $file"
            python3 -m json.tool "$file" >/dev/null
          done

      - name: Download sing-box
        run: |
          set -eu

          VERSION="1.12.17"
          ARCHIVE="sing-box-${VERSION}-linux-amd64.tar.gz"
          URL="https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/${ARCHIVE}"

          curl --fail --location "$URL" --output "$ARCHIVE"
          tar -xzf "$ARCHIVE"

          install \
            -m 0755 \
            "sing-box-${VERSION}-linux-amd64/sing-box" \
            /usr/local/bin/sing-box

          sing-box version

      - name: Compile rule sets
        run: |
          set -eu

          mkdir -p output

          for file in rules/*.json; do
            name="$(basename "$file" .json)"

            echo "Compiling $name"

            sing-box rule-set compile \
              --output "output/${name}.srs" \
              "$file"

            test -s "output/${name}.srs"
          done

          ls -lh output/*.srs

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest rule sets
          make_latest: true
          files: output/*.srs
